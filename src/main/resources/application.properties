spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/roamsafe_db}
spring.datasource.username=${DB_USER:mac2}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google Sheets Webhook URL
google.sheets.webhook.url=${GOOGLE_SHEETS_URL:}

# Server Configuration
server.port=8080

# Logging
logging.level.com.roamsafe=DEBUG
logging.level.org.springframework.web=DEBUG

# Dev Tools
spring.thymeleaf.cache=false

# Bachs payments (https://bachs.io) — settles to NGN, supports subscriptions + one-time.
# Defaults to SANDBOX for safe testing: uses the sandbox demo key if present, and
# the sandbox product ids below. The API host is auto-resolved from the key prefix.
# To GO LIVE: unset BACH_DEMO_KEY (so BACH_API_KEY/live is used), and set
#   BACHS_TRIP_PASS_PRODUCT=prod_fe6bdaeda81e44f381d3
#   BACHS_NOMAD_PRODUCT=prod_e32c1dd954364b7a96a2   (the live products)
bachs.api.url=${BACHS_API_URL:}
bachs.api.key=${BACH_DEMO_KEY:${BACH_API_KEY:}}
bachs.webhook.secret=${BACHS_DEMO_WEBHOOK_SECRET:${BACHS_WEBHOOK_SECRET:}}
bachs.product.trip-pass=${BACHS_TRIP_PASS_PRODUCT:prod_c10f1eb2b1654e228350}
bachs.product.nomad=${BACHS_NOMAD_PRODUCT:prod_614dcd04f15c43ed9a10}
bachs.success.url=${BACHS_SUCCESS_URL:http://localhost:8080/pricing?success=true}
bachs.cancel.url=${BACHS_CANCEL_URL:http://localhost:8080/pricing?canceled=true}