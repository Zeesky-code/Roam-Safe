<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · RoamSafe</title>
  <link rel="stylesheet" th:href="@{/css/modern-theme.css}" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

  <div th:replace="~{fragments/shell :: nav('')}"></div>
  <div th:replace="~{fragments/shell :: palette(${paletteItems})}"></div>

  <main class="rs-auth">
    <div class="rs-auth-card">
      <div class="rs-auth-head">
        <h1>Welcome back</h1>
        <p>Sign in to your RoamSafe account</p>
      </div>

      <div th:if="${success}" class="rs-note ok">
        <span th:text="${success}"></span>
        <button type="button" onclick="this.parentElement.style.display='none'">×</button>
      </div>
      <div th:if="${error}" class="rs-note err">
        <span th:text="${error}"></span>
        <button type="button" onclick="this.parentElement.style.display='none'">×</button>
      </div>

      <form th:action="@{/login}" th:object="${loginRequest}" method="post" class="rs-auth-form">
        <div class="rs-form-group">
          <label for="email">Email</label>
          <input type="email" id="email" th:field="*{email}" placeholder="you@example.com" required />
          <span th:if="${#fields.hasErrors('email')}" class="rs-auth-error" th:errors="*{email}"></span>
        </div>

        <div class="rs-form-group">
          <label for="password">Password</label>
          <input type="password" id="password" th:field="*{password}" placeholder="Your password" required />
          <span th:if="${#fields.hasErrors('password')}" class="rs-auth-error" th:errors="*{password}"></span>
        </div>

        <div class="rs-form-group rs-auth-checkbox">
          <label>
            <input type="checkbox" th:field="*{rememberMe}" />
            Remember me
          </label>
        </div>

        <button type="submit" class="rs-btn-primary rs-auth-submit">Sign in</button>
      </form>

      <div class="rs-auth-foot">
        <p>Don't have an account? <a th:href="@{/register}">Create one</a></p>
        <p><a href="/">← Back to home</a></p>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/shell :: footer}"></div>
  <div th:replace="~{fragments/shell :: script}"></div>
  <script>lucide.createIcons();</script>
</body>

</html>
