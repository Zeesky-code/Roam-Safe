<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live map · RoamSafe</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" th:href="@{/css/modern-theme.css}" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

  <div th:replace="~{fragments/shell :: nav('map')}"></div>
  <div th:replace="~{fragments/shell :: palette(${paletteItems})}"></div>

  <div class="rs-map-wrap">
    <div id="map-bg"></div>

    <!-- Search -->
    <div class="rs-map-search">
      <form action="/scams" method="get">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"
          stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted)">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </svg>
        <input type="text" name="city" placeholder="Search a city for its full report…" autocomplete="off" />
        <button type="submit">Open report</button>
      </form>
    </div>

    <!-- Legend -->
    <div class="rs-map-legend">
      <div><span class="rs-legend-dot" style="background:var(--sev-low)"></span> Reassuring / safe</div>
      <div><span class="rs-legend-dot" style="background:var(--sev-medium)"></span> Caution</div>
      <div><span class="rs-legend-dot" style="background:var(--sev-high)"></span> Serious risk</div>
    </div>

    <!-- Pin detail (real report on click) -->
    <div id="map-detail" class="rs-map-detail">
      <button type="button" class="rs-map-detail-close" onclick="document.getElementById('map-detail').classList.remove('active')">×</button>
      <div id="map-detail-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const map = L.map('map-bg', { zoomControl: false, attributionControl: false })
      .setView([30, 10], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Hand-placed city centers (DB has no lat/lng yet). Pins for cities we know.
    const cityCoords = {
      "Paris": [48.8566, 2.3522], "London": [51.5074, -0.1278], "Rome": [41.9028, 12.4964],
      "Barcelona": [41.3851, 2.1734], "Istanbul": [41.0082, 28.9784], "New York": [40.7128, -74.006],
      "Tokyo": [35.6762, 139.6503], "Bangkok": [13.7563, 100.5018], "Bali": [-8.4095, 115.1889],
      "Cairo": [30.0444, 31.2357], "Lisbon": [38.7223, -9.1393], "Amsterdam": [52.3676, 4.9041],
      "Prague": [50.0755, 14.4378], "Dubai": [25.2048, 55.2708], "Mexico City": [19.4326, -99.1332],
      "Rio de Janeiro": [-22.9068, -43.1729], "Cape Town": [-33.9249, 18.4241], "Sydney": [-33.8688, 151.2093],
      "Nairobi": [-1.2864, 36.8172], "Marrakech": [31.6295, -7.9811], "Athens": [37.9838, 23.7275],
      "Vienna": [48.2082, 16.3738], "Berlin": [52.52, 13.405], "Singapore": [1.3521, 103.8198],
      "Seoul": [37.5665, 126.978], "Delhi": [28.6139, 77.209], "Mumbai": [19.076, 72.8777]
    };

    function zoneColor(zone) {
      if (zone === 'GREEN' || zone === 'SAFE') return getCss('--sev-low');
      if (zone === 'YELLOW' || zone === 'CAUTION') return getCss('--sev-medium');
      return getCss('--sev-high');
    }
    function getCss(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

    function riskIcon(zone) {
      const color = zoneColor(zone);
      return L.divIcon({
        className: 'custom-pin',
        html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,
        iconSize: [20, 20], iconAnchor: [10, 10]
      });
    }

    function showDetail(r) {
      const sev = (r.safetyZone === 'GREEN') ? 'low' : (r.safetyZone === 'YELLOW') ? 'medium' : 'high';
      document.getElementById('map-detail-body').innerHTML = `
        <h3>${r.name}</h3>
        <div class="rs-map-loc">${r.neighborhood ? r.neighborhood + ' · ' : ''}${r.city}</div>
        <span class="rs-sev-chip" style="background:var(--sev-${sev}-bg);color:var(--sev-${sev})">${r.safetyZone}</span>
        <p style="margin-top:12px">${r.description || ''}</p>
        ${r.preventionTips ? `<div class="rs-tip"><div class="rs-tip-label">How to stay clear</div><p>${r.preventionTips}</p></div>` : ''}
        <a href="/scams?city=${encodeURIComponent(r.city)}" class="rs-btn-outline" style="margin-top:14px;height:36px;padding:0 14px">Full report →</a>`;
      document.getElementById('map-detail').classList.add('active');
    }

    async function loadData() {
      try {
        const res = await fetch('/api/v1/alerts/feed?size=200', { headers: { 'X-API-KEY': 'roamsafe-secret-key-123' } });
        if (!res.ok) return;
        const reports = await res.json();
        reports.forEach(r => {
          const c = cityCoords[r.city];
          if (!c) return; // only plot cities we have coordinates for
          const lat = c[0] + (Math.random() - 0.5) * 0.06;
          const lng = c[1] + (Math.random() - 0.5) * 0.06;
          L.marker([lat, lng], { icon: riskIcon(r.safetyZone) }).addTo(map).on('click', () => showDetail(r));
        });
      } catch (e) { console.error('map data load failed', e); }
    }
    loadData();
    lucide.createIcons();
  </script>
  <div th:replace="~{fragments/shell :: script}"></div>
</body>

</html>
