# Production overrides. Activate with SPRING_PROFILES_ACTIVE=prod.
# Base application.properties keeps dev-friendly defaults; this file tightens
# them for a deployed instance.

# Don't log every SQL statement
spring.jpa.show-sql=false

# Cache compiled templates (base disables this for hot-reload in dev)
spring.thymeleaf.cache=true

# Quieter logs
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.zainab.roamSafe=INFO
logging.level.org.hibernate.SQL=WARN

# Schema is created/updated by Hibernate on first boot; "update" is fine for a
# single-instance app. Switch to "validate" + real migrations if this grows.
spring.jpa.hibernate.ddl-auto=update

# --- Time-to-listening ---
# Hosts health-check a deploy by connecting to $PORT and give up after roughly a
# minute. Everything below exists to get Tomcat bound well inside that window;
# a deploy that is marked failed while the app is actually healthy is the most
# expensive failure mode here.

# Build beans on first use instead of all at startup. Tomcat binds in seconds
# rather than waiting on the full context (JPA metadata, remote Neon round-trips).
# Cost: the first request to a given path pays that bean's init once.
spring.main.lazy-initialization=true

# Don't let a cold serverless database hold the pool open at boot. Neon suspends
# when idle and the first connection has to wake it.
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5

# Long enough to cover waking a suspended Neon compute. This was briefly set to
# 10s, which is fine against a warm database and not against a sleeping one -
# every deployed request failed with "Connection is not available, request timed
# out after 10001ms" while the same setting passed locally, because local
# testing kept the database permanently awake. Hikari's default is 30s and there
# is no reason to be tighter than that here.
spring.datasource.hikari.connection-timeout=30000

# Keep booting even when the database is unreachable (-1), but never silently:
# DatasourceCheck probes the connection at startup and logs the failure loudly,
# and /health/db reports it on demand.
#
# Crashing instead is tempting - it's certainly visible - but it leaves nothing
# running to ask, so all anyone outside sees is a restart loop and a 503 from
# the router, which is indistinguishable from a port or health-check problem.
# Staying up with an endpoint that names the host it tried turns a guessing game
# into one request. The silent-failure risk is handled by the logging, not by
# taking the process down.
spring.datasource.hikari.initialization-fail-timeout=-1
