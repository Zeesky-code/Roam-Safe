# Test overrides. Deliberately a PROFILE, not application.properties: a file of
# that name under src/test/resources shadows the main one entirely, which
# silently dropped every real setting (the Bachs product ids among them) and
# made the context fail for a reason that had nothing to do with the test.
spring.datasource.url=jdbc:h2:mem:roamsafe;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=MONTH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# No admin account is created in tests.
admin.email=
admin.password=
